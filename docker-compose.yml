services:
  task-quest-api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - task-quest-db
    volumes:
      - .:/app
      - /app/node_modules

  task-quest-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task-quest-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: