name: CI/CD Task-Quest API

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install & Build (Biar yakin gak ada error code sebelum deploy)
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      # 4️⃣ Deploy ke VPS menggunakan appleboy/ssh-action
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            # Masuk ke folder project, kalau belum ada kita clone atau mkdir
            mkdir -p ~/project-root
            cd ~/project-root

            # Tarik kode terbaru dari repo (Pastikan VPS sudah ada akses git ke repo ini)
            # Atau kalau lu mau tetep pakai cara copy, kita asumsikan file sudah di-push ke main
            git pull origin main

            # Build dan jalankan service
            # Kita pakai --build biar dia nge-refresh image backend-nya
            docker-compose up -d --build task-quest-api

            # Opsional: Jalankan migrasi database di dalam container
            # docker-compose exec -T task-quest-api npx prisma db push
