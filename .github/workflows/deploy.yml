name: CI/CD Task-Quest API

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout kode ke Runner (GitHub)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js untuk pengecekan build
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Validasi Build (Mencegah deploy jika ada error coding)
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      # 4️⃣ Eksekusi Deploy ke VPS via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            # 1. Masuk ke folder root
            cd ~/project-root

            # 2. Update Source Code Backend
            if [ ! -d "backend/.git" ]; then
              echo "Cloning backend..."
              git clone git@github.com:KyyTzy09/FicPact-Backend.git backend
            else
              echo "Syncing backend..."
              cd backend
              git fetch origin main
              git reset --hard origin/main
              cd ..
            fi

            # 3. Eksekusi Docker dari dalam folder BACKEND
            # Ini cara paling aman agar Docker nemu .env.production tanpa drama path
            echo "Restarting Docker services..."
            cd backend

            # Kita jalankan docker compose sambil menunjuk file yaml di root (jika ada)
            # atau biarkan dia pakai yang ada di folder backend.
            # Menggunakan --env-file dengan nama file lokal
            docker compose --env-file .env.production up -d --build backend

            # 4. Jalankan Prisma Migration
            echo "Running database migrations..."
            sleep 5
            # Gunakan --env-file lagi agar Prisma tahu DATABASE_URL-nya
            docker compose --env-file .env.production exec -T backend npx prisma migrate deploy

            # 5. Cleanup & Selesai
            echo "Cleaning up..."
            docker image prune -f
            echo "✅ Deployment finished successfully dari folder backend!"
