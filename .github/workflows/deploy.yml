name: CI/CD Task-Quest API

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout kode ke Runner (GitHub)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js untuk pengecekan build
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Validasi Build (Mencegah deploy jika ada error coding)
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      # 4️⃣ Eksekusi Deploy ke VPS via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            # Masuk ke root project
            cd ~/project-root

            # Update repository backend
            if [ ! -d "backend/.git" ]; then
              echo "Cloning backend..."
              git clone git@github.com:KyyTzy09/FicPact-Backend.git backend
            else
              echo "Syncing backend..."
              cd backend
              git fetch origin main
              # Reset hard untuk menghapus perubahan lokal (seperti package.json yang error tadi)
              git reset --hard origin/main
              cd ..
            fi

            # Restart Docker dengan menunjuk file env di dalam folder backend
            echo "Restarting Docker services..."
            # Kita pakai flag --env-file agar docker-compose di root bisa baca .env.production di dalam backend/
            docker compose --env-file backend/.env.production up -d --build backend

            # Jalankan migrasi Prisma agar database sinkron
            echo "Running database migrations..."
            # Tunggu 5 detik memastikan DB sudah siap menerima koneksi
            sleep 5
            docker compose exec -T backend npx prisma migrate deploy

            # Bersihkan image lama untuk menghemat storage VPS
            echo "Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment finished successfully!"