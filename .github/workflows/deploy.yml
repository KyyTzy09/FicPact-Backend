name: CI/CD Task-Quest API

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install & Build (Biar yakin gak ada error code sebelum deploy)
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      # 4️⃣ Deploy ke VPS menggunakan appleboy/ssh-action
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            # Masuk ke folder root project
            mkdir -p ~/project-root
            cd ~/project-root

            # Cek apakah folder ini sudah ada git-nya, kalau belum kita clone
            if [ ! -d ".git" ]; then
              echo "Repo not found, cloning..."
              git clone git@github.com:KyyTzy09/FicPact-Backend.git .
            else
              echo "Repo exists, pulling latest changes..."
              git pull origin main
            fi

            # Build dan jalankan service pake DOCKER COMPOSE (SPASI)
            # Karena versi 1.29 (strip) sudah kita hapus tadi
            docker compose up -d --build task-quest-api

            # Jalankan migrasi prisma biar database-nya sinkron
            docker compose exec -T task-quest-api npx prisma migrate deploy