name: CI/CD Task-Quest API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies backend
      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      # 4️⃣ Build backend
      - name: Build backend
        run: npm run build
        working-directory: ./backend

      # 5️⃣ Generate Prisma client
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: ./backend

      # 6️⃣ Copy backend + docker-compose.yml ke VPS
      - name: Copy backend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: |
            backend
            docker-compose.yml
          target: ~/project-root

      # 7️⃣ Stop & rebuild backend service di VPS
      - name: Deploy backend on VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd ~/project-root
            docker-compose stop task-quest-api || true
            docker-compose up -d --build task-quest-api
