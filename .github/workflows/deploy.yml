name: CI/CD Task-Quest API

on:
  push:
    branches:
      - main   # tiap push ke main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Build Docker image
      run: docker build -t project-root_task-quest-api .

    - name: Push & Deploy to VPS
      env:
        VPS_USER: ${{ secrets.VPS_USER }}
        VPS_HOST: ${{ secrets.VPS_HOST }}
      run: |
        scp docker-compose.yml $VPS_USER@$VPS_HOST:/home/$VPS_USER/project-root/
        ssh $VPS_USER@$VPS_HOST "cd ~/project-root && docker-compose pull && docker-compose up -d --build"