name: CI/CD Task-Quest API

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout kode ke Runner (GitHub)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js untuk pengecekan build
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Validasi Build (Mencegah deploy jika ada error coding)
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      # 4️⃣ Eksekusi Deploy ke VPS via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e

            # 1. Masuk ke folder root
            cd ~/project-root

            # 2. Update Source Code Backend
            if [ ! -d "backend/.git" ]; then
              echo "Cloning backend..."
              git clone git@github.com:KyyTzy09/FicPact-Backend.git backend
            else
              echo "Syncing backend..."
              cd backend
              git fetch origin main
              git reset --hard origin/main
              cd ..
            fi

            # 3. Jalankan Docker dari ROOT (INI YANG BENAR)
            echo "Restarting Docker services..."
            docker compose --env-file backend/.env.production up -d --build backend

            # 4. (Optional) Migration — sebenarnya sudah jalan di container
            echo "Running database migrations..."
            docker compose --env-file backend/.env.production exec -T backend npx prisma migrate deploy

            # 5. Cleanup
            echo "Cleaning up..."
            docker image prune -f

            echo "✅ Deployment finished successfully!"
