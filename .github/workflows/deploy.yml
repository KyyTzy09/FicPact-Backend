name: CI/CD Task-Quest API

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies (di root)
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build project
      - name: Build backend
        run: npm run build

      # 5️⃣ Generate Prisma client
      - name: Generate Prisma client
        run: npx prisma generate

      # 6️⃣ Setup SSH agent untuk deploy
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.3
        with:
          ssh-private-key: ${{ secrets.VPS_KEY }}

      # 7️⃣ Deploy ke VPS
      - name: Deploy to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # Buat folder project kalau belum ada
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "mkdir -p ~/project-root"

          # Copy semua file dari root repo ke VPS
          scp -o StrictHostKeyChecking=no -r ./ $VPS_USER@$VPS_HOST:~/project-root/

          # Stop service lama
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "cd ~/project-root && docker-compose stop task-quest-api || true"

          # Build & jalankan hanya service backend
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "cd ~/project-root && docker-compose up -d --build task-quest-api"