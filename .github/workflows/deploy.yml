name: CI/CD Task-Quest API

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Ambil kode terbaru dari repo GitHub (Runner)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Siapkan Node.js di Runner
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      # 3️⃣ Cek Error: Install & Build dulu di Runner (Biar gak deploy code rusak)
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      # 4️⃣ Eksekusi Deploy ke VPS via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            # Masuk ke folder root project
            cd ~/project-root || { echo "Folder project-root tidak ditemukan"; exit 1; }

            # 1. Update kode di folder backend
            if [ ! -d "backend/.git" ]; then
              echo "Cloning backend repository..."
              rm -rf backend
              git clone git@github.com:KyyTzy09/FicPact-Backend.git backend
            else
              echo "Pulling latest changes for backend..."
              cd backend && git pull origin main && cd ..
            fi

            # 2. Re-deploy Backend & DB secara bersih
            # --build: paksa build image baru dari code yang baru di-pull
            # --force-recreate: abaikan cache container lama, buat ulang dari nol
            echo "Restarting services..."
            docker compose up -d --build --force-recreate backend task-quest-db

            # 3. Tunggu Database siap (agar tidak error P1000 saat migrasi)
            echo "Waiting for database to be ready (15s)..."
            sleep 15

            # 4. Jalankan Migrasi Database otomatis
            echo "Running database migrations..."
            docker exec task-quest-api npx prisma migrate deploy

            # 5. Maintenance: Hapus image "dangling" (image lama yang gak kepake)
            # Ini krusial agar RAM dan Disk VPS kamu gak penuh
            echo "Cleaning up old images..."
            docker image prune -f

            echo "🚀 Deployment Success!"
