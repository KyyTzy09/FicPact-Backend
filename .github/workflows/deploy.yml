name: CI/CD Task-Quest API

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            # 1. Masuk ke folder root
            mkdir -p ~/project-root
            cd ~/project-root

            # 2. Update Source Code Backend
            if [ ! -d "backend/.git" ]; then
              echo "Cloning backend..."
              git clone git@github.com:KyyTzy09/FicPact-Backend.git backend
            else
              echo "Syncing backend..."
              cd backend
              git fetch origin main
              git reset --hard origin/main
              cd ..
            fi

            # 3. Sinkronisasi file docker-compose (Opsional)
            # Jika docker-compose.yml ada di dalam repo backend, copy ke root
            if [ -f "backend/docker-compose.yml" ]; then
              cp backend/docker-compose.yml .
            fi

            # 4. Restart Docker Service
            echo "Restarting services..."
            # --force-recreate memastikan container backend dibuat ulang dengan env terbaru
            docker compose up -d --build backend

            # 5. Jalankan Prisma Migration di dalam Container
            # Ini penting agar DB sync dengan skema terbaru setelah pull
            echo "Running database migrations..."
            docker compose exec -T backend npx prisma migrate deploy

            # 6. Cleanup
            docker image prune -f